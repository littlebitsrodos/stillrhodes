    </g>

    <g>
      <rect x="8" y="149" width="132" height="38" rx="7" fill="#123840"/>
      <text x="14" y="160" font-size="3.2" letter-spacing="0.65" font-weight="700" fill="#e5bd5b">BOOK ON WHATSAPP</text>
