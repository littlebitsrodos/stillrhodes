<svg xmlns="http://www.w3.org/2000/svg" width="148mm" height="210mm" viewBox="0 0 148 210">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f1df"/>
      <stop offset="0.55" stop-color="#e9dfc4"/>
      <stop offset="1" stop-color="#d8c487"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="36%" r="38%">
      <stop offset="0" stop-color="#d6b85f" stop-opacity="0.78"/>
      <stop offset="0.55" stop-color="#d6b85f" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d6b85f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#254c55" flood-opacity="0.22"/>
    </filter>
    <style>
      .serif{font-family:'EB Garamond','Georgia',serif;}
      .sans{font-family:'Inter','Helvetica Neue',Arial,sans-serif;}
      .ink{fill:#25343a;}
      .sea{fill:#2f6f73;}
      .sage{fill:#6f8b68;}
      .gold{fill:#c8a94c;}
      .small{font-size:3.2px;letter-spacing:.25px;}
      .body{font-size:4.1px;line-height:1.35;}
    </style>
  </defs>

  <rect width="148" height="210" fill="url(#sky)"/>
  <circle cx="74" cy="72" r="56" fill="url(#sun)"/>

  <!-- quiet sea/earth shapes -->
  <path d="M0 157 C25 147 42 162 69 151 C93 141 112 146 148 135 L148 210 L0 210 Z" fill="#2f6f73" opacity="0.92"/>
  <path d="M0 169 C25 160 49 176 77 165 C105 154 126 158 148 150 L148 210 L0 210 Z" fill="#254c55" opacity="0.94"/>
  <path d="M0 183 C28 175 50 188 78 179 C108 170 127 174 148 166 L148 210 L0 210 Z" fill="#6f8b68" opacity="0.76"/>

  <!-- lotus mark -->
  <g transform="translate(74 57)" filter="url(#softShadow)">
    <path d="M0 -26 C8 -13 8 -2 0 9 C-8 -2 -8 -13 0 -26Z" fill="#f7f1df" stroke="#2f6f73" stroke-width="0.9"/>
    <path d="M-5 -12 C-20 -9 -29 1 -31 17 C-15 15 -5 7 0 9 C-2 1 -5 -5 -5 -12Z" fill="#e4c75f" stroke="#2f6f73" stroke-width="0.75" opacity="0.96"/>
    <path d="M5 -12 C20 -9 29 1 31 17 C15 15 5 7 0 9 C2 1 5 -5 5 -12Z" fill="#e4c75f" stroke="#2f6f73" stroke-width="0.75" opacity="0.96"/>
    <path d="M-1 -8 C-12 -2 -16 10 -12 22 C-4 18 1 13 0 9 C-2 3 -2 -3 -1 -8Z" fill="#f2e8c8" stroke="#254c55" stroke-width="0.7" opacity="0.98"/>
    <path d="M1 -8 C12 -2 16 10 12 22 C4 18 -1 13 0 9 C2 3 2 -3 1 -8Z" fill="#f2e8c8" stroke="#254c55" stroke-width="0.7" opacity="0.98"/>
    <path d="M-34 21 C-17 31 17 31 34 21" fill="none" stroke="#2f6f73" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="2.4" fill="#c8a94c"/>
  </g>

  <!-- header -->
  <text x="74" y="102" text-anchor="middle" class="serif ink" font-size="15.8" letter-spacing="1.5">STILL RHODES</text>
  <line x1="44" y1="108" x2="104" y2="108" stroke="#c8a94c" stroke-width="0.8"/>
  <text x="74" y="116" text-anchor="middle" class="sans sea" font-size="5.6" letter-spacing=".9">MEDITATION IN RHODES</text>
  <text x="74" y="124" text-anchor="middle" class="sans ink" font-size="4.15" letter-spacing=".12">a quiet moment for your mind during your stay</text>

  <!-- main copy card -->
  <g>
    <rect x="14" y="132" width="120" height="37" rx="3" fill="#faf8f5" opacity="0.82"/>
    <text x="20" y="141.5" class="serif ink" font-size="6.2">Pause. Breathe. Return.</text>
    <text x="20" y="150" class="sans ink" font-size="3.75">A calm 60-minute meditation experience for visitors</text>
    <text x="20" y="155.4" class="sans ink" font-size="3.75">who want to feel Rhodes beyond the rush of travel.</text>
    <text x="20" y="163" class="sans sea" font-size="3.45">Medieval Town · Faliraki · sea, silence and presence</text>
  </g>

  <!-- session blocks -->
  <g transform="translate(14 176)">
    <rect x="0" y="0" width="57" height="20" rx="2.5" fill="#faf8f5" opacity="0.9"/>
    <text x="5" y="7" class="sans sea" font-size="3.5" font-weight="700">GROUP SESSION</text>
    <text x="5" y="13" class="sans ink" font-size="3.45">60 min · Rhodes/Faliraki</text>
    <text x="45" y="17" text-anchor="middle" class="serif gold" font-size="7">€10</text>
  </g>
  <g transform="translate(77 176)">
    <rect x="0" y="0" width="57" height="20" rx="2.5" fill="#faf8f5" opacity="0.9"/>
    <text x="5" y="7" class="sans sea" font-size="3.5" font-weight="700">PRIVATE SESSION</text>
    <text x="5" y="13" class="sans ink" font-size="3.45">Tailored to your pace</text>
    <text x="5" y="17.5" class="sans gold" font-size="3.25">Upon arrangement</text>
  </g>

  <!-- footer -->
  <text x="14" y="203" class="sans" font-size="3.6" fill="#faf8f5">stillrhodes.com</text>
  <text x="134" y="203" text-anchor="end" class="sans" font-size="3.6" fill="#faf8f5">Book on WhatsApp · scan / contact</text>
</svg>
